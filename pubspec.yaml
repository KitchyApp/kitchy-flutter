name: kitchy_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  image_picker: ^1.2.2
  http: ^1.2.1
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.3.0
  shared_preferences: ^2.5.3
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_secure_storage: ^10.3.1


  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/KitchyAppLogo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/